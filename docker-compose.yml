services:
  db:
    image: postgres:15
    container_name: eventhub_db
    environment:
      POSTGRES_DB: eventhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - eventhub_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../eventhub-backend
    container_name: eventhub_backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/eventhub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../eventhub-frontend
    container_name: eventhub_frontend
    environment:
      VITE_API_URL: http://localhost:8081
      VITE_DEV_PROXY_TARGET: http://backend:8081
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  eventhub_db_data:
